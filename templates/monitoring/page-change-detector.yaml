template:
  id: page-change-detector
  category: monitoring
  tags: [monitoring, change-detection, diff]
  icon: refresh
  difficulty: advanced
  estimated_time: "3-5 分钟"

title: 页面变更检测
description: 访问指定页面，提取关键内容区域的文本，用于定期对比检测页面是否有更新

parameters:
  - key: page_url
    type: string
    description: 要监控的页面 URL
    required: true
  - key: content_description
    type: string
    description: 要监控的内容区域描述
    default: "页面主要内容区域的文本"
    required: false

blocks:
  - block_type: navigation
    label: open_page
    url: "{{ page_url }}"

  - block_type: extraction
    label: extract_content
    data_extraction_goal: "提取{{ content_description }}"
    data_schema:
      type: object
      properties:
        content:
          type: string
          description: 提取的文本内容
        timestamp:
          type: string
          description: 提取时间

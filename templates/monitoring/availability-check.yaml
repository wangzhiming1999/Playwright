template:
  id: availability-check
  category: monitoring
  tags: [uptime, availability, health-check]
  icon: check-circle
  difficulty: beginner
  estimated_time: "1-3 分钟"

title: 页面可用性检测
description: 访问指定 URL，检查页面是否可正常打开并返回状态摘要，适合做简单可用性监控

parameters:
  - key: page_url
    type: string
    description: 要检测的页面 URL
    required: true
  - key: expected_title_contains
    type: string
    description: 期望标题包含的文字（可选，用于校验是否为正确页面）
    default: ""
    required: false

blocks:
  - block_type: navigation
    label: open_page
    url: "{{ page_url }}"

  - block_type: extraction
    label: get_status
    data_extraction_goal: "提取当前页面标题和主要可见内容的前 200 字，用于判断页面是否正常加载"
    data_schema:
      type: object
      properties:
        title:
          type: string
          description: 页面标题
        preview:
          type: string
          description: 内容预览
        has_error:
          type: boolean
          description: 是否看到明显错误提示（如 404、502）

  - block_type: code
    label: summary
    code: |
      import json
      data = ctx.get_output("get_status") or {}
      title = data.get("title", "")
      has_error = data.get("has_error", False)
      expected = "{{ expected_title_contains }}"
      ok = not has_error and (not expected or (expected in title))
      _result_ = {
        "available": ok,
        "title": title,
        "has_error": has_error,
        "message": "可用" if ok else "不可用或与预期不符"
      }

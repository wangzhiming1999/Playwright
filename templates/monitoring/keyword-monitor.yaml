template:
  id: keyword-monitor
  category: monitoring
  tags: [keyword, monitoring, alert, content]
  icon: search
  difficulty: beginner
  estimated_time: "2-4 分钟"

title: 关键词监控
description: 打开指定页面，检查是否出现某关键词或短语，并返回是否命中及上下文

parameters:
  - key: page_url
    type: string
    description: 要监控的页面 URL
    required: true
  - key: keyword
    type: string
    description: 要检测的关键词或短语
    required: true
  - key: case_sensitive
    type: boolean
    description: 是否区分大小写
    default: false
    required: false

blocks:
  - block_type: navigation
    label: open_page
    url: "{{ page_url }}"

  - block_type: extraction
    label: get_content
    data_extraction_goal: "提取页面主体文本内容，并判断是否包含关键词「{{ keyword }}」；若包含，提取该词所在的一句话或段落作为上下文"
    data_schema:
      type: object
      properties:
        contains_keyword:
          type: boolean
          description: 是否包含关键词
        context:
          type: string
          description: 关键词所在上下文
        full_text_preview:
          type: string
          description: 正文前 500 字预览

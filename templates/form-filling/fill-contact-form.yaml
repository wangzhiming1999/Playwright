template:
  id: fill-contact-form
  category: form-filling
  tags: [form, contact, automation]
  icon: edit
  difficulty: beginner
  estimated_time: "1-3 分钟"

title: 联系表单填写
description: 自动填写网站上的联系表单，支持姓名、邮箱、电话、留言等常见字段

parameters:
  - key: form_url
    type: string
    description: 表单页面 URL
    required: true
  - key: name
    type: string
    description: 姓名
    required: true
  - key: email
    type: string
    description: 邮箱地址
    required: true
  - key: message
    type: string
    description: 留言内容
    default: ""
    required: false

blocks:
  - block_type: navigation
    label: open_form
    url: "{{ form_url }}"

  - block_type: task
    label: fill_form
    task: "找到联系表单，填写以下信息：姓名「{{ name }}」，邮箱「{{ email }}」，留言「{{ message }}」。填写完成后点击提交按钮。"

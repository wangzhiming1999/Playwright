<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Browser Agent</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }

  header { padding: 20px 32px; border-bottom: 1px solid #1e2535; display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 18px; font-weight: 600; color: #fff; }
  header span { font-size: 12px; color: #64748b; background: #1e2535; padding: 2px 8px; border-radius: 4px; }

  .main { display: grid; grid-template-columns: 360px 1fr; height: calc(100vh - 61px); }

  /* Left panel */
  .panel-left { border-right: 1px solid #1e2535; display: flex; flex-direction: column; overflow: hidden; }
  .panel-left .top { padding: 20px; border-bottom: 1px solid #1e2535; }
  .panel-left .top label { font-size: 12px; color: #94a3b8; display: block; margin-bottom: 8px; }
  textarea {
    width: 100%; height: 120px; background: #1e2535; border: 1px solid #2d3748;
    border-radius: 8px; color: #e2e8f0; font-size: 13px; padding: 10px 12px;
    resize: vertical; outline: none; font-family: inherit; line-height: 1.5;
  }
  textarea:focus { border-color: #4f6ef7; }
  textarea::placeholder { color: #475569; }
  button#run-btn {
    margin-top: 10px; width: 100%; padding: 10px; background: #4f6ef7;
    border: none; border-radius: 8px; color: #fff; font-size: 14px; font-weight: 500;
    cursor: pointer; transition: background 0.15s;
  }
  button#run-btn:hover { background: #3b5bdb; }
  button#run-btn:disabled { background: #2d3748; color: #64748b; cursor: not-allowed; }

  .quick-tasks { padding: 12px 20px; border-bottom: 1px solid #1e2535; }
  .quick-tasks label { font-size: 12px; color: #94a3b8; display: block; margin-bottom: 8px; }
  .quick-btn {
    width: 100%; padding: 8px 12px; background: #1e2535; border: 1px solid #2d3748;
    border-radius: 8px; color: #cbd5e1; font-size: 12px; text-align: left;
    cursor: pointer; transition: border-color 0.15s, background 0.15s; line-height: 1.4;
  }
  .quick-btn:hover { border-color: #4f6ef7; background: #1a2340; color: #e2e8f0; }

  .task-list { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
  .task-item {
    background: #1e2535; border: 1px solid #2d3748; border-radius: 8px;
    padding: 12px; cursor: pointer; transition: border-color 0.15s;
  }
  .task-item:hover { border-color: #4f6ef7; }
  .task-item.active { border-color: #4f6ef7; background: #1a2340; }
  .task-item .task-text { font-size: 13px; color: #cbd5e1; white-space: pre-line; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; word-break: break-word; }
  .task-item .task-meta { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
  .task-item .task-id { font-size: 11px; color: #475569; font-family: monospace; }
  .badge { font-size: 11px; padding: 1px 7px; border-radius: 10px; font-weight: 500; }
  .badge.pending  { background: #1e3a5f; color: #60a5fa; }
  .badge.running  { background: #1a3a2a; color: #34d399; }
  .badge.done     { background: #1a3a1a; color: #4ade80; }
  .badge.failed   { background: #3a1a1a; color: #f87171; }

  /* Right panel */
  .panel-right { display: flex; flex-direction: column; overflow: hidden; }
  .panel-right .empty {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; color: #475569; gap: 8px;
  }
  .panel-right .empty svg { opacity: 0.3; }

  .detail { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .detail-header { padding: 16px 24px; border-bottom: 1px solid #1e2535; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .detail-header .task-title { font-size: 14px; color: #e2e8f0; flex: 1; white-space: pre-line; word-break: break-word; min-width: 0; }

  /* Tabs */
  .tabs { display: flex; gap: 0; border-bottom: 1px solid #1e2535; }
  .tab-btn {
    padding: 10px 20px; font-size: 13px; color: #64748b; background: none;
    border: none; border-bottom: 2px solid transparent; cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
  }
  .tab-btn:hover { color: #e2e8f0; }
  .tab-btn.active { color: #e2e8f0; border-bottom-color: #4f6ef7; }

  .tab-panel { display: none; flex: 1; overflow: hidden; flex-direction: column; }
  .tab-panel.active { display: flex; }

  /* Logs tab */
  .logs-wrap { overflow-y: auto; padding: 16px 24px; flex: 1; }
  pre.logs {
    font-family: "Cascadia Code", "Fira Code", monospace; font-size: 12px;
    color: #94a3b8; line-height: 1.7; white-space: pre-wrap; word-break: break-all;
  }
  pre.logs .log-action { color: #60a5fa; }
  pre.logs .log-ok     { color: #4ade80; }
  pre.logs .log-warn   { color: #fbbf24; }
  pre.logs .log-err    { color: #f87171; }

  /* Screenshots tab */
  .screenshots-wrap { padding: 16px 24px; display: flex; flex-wrap: wrap; gap: 12px; overflow-y: auto; flex: 1; }
  .screenshots-wrap img {
    max-width: 320px; max-height: 220px; border-radius: 6px;
    border: 1px solid #2d3748; object-fit: contain; background: #0f1117;
    cursor: pointer; transition: border-color 0.15s;
  }
  .screenshots-wrap img:hover { border-color: #4f6ef7; }

  /* Curation tab */
  .curate-bar {
    padding: 16px 24px; border-bottom: 1px solid #1e2535;
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  .curate-bar input[type="text"] {
    flex: 1; min-width: 200px; background: #1e2535; border: 1px solid #2d3748;
    border-radius: 8px; color: #e2e8f0; font-size: 13px; padding: 8px 12px; outline: none;
  }
  .curate-bar input[type="text"]:focus { border-color: #4f6ef7; }
  .curate-bar input[type="text"]::placeholder { color: #475569; }
  .curate-bar button {
    padding: 8px 18px; background: #7c3aed; border: none; border-radius: 8px;
    color: #fff; font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap;
    transition: background 0.15s;
  }
  .curate-bar button:hover { background: #6d28d9; }
  .curate-bar button:disabled { background: #2d3748; color: #64748b; cursor: not-allowed; }

  .curate-stats {
    padding: 8px 24px; font-size: 12px; color: #64748b;
    border-bottom: 1px solid #1e2535;
  }

  .cards-wrap { padding: 20px 24px; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; flex: 1; }

  .asset-card {
    background: #1e2535; border: 1px solid #2d3748; border-radius: 12px;
    display: grid; grid-template-columns: 280px 1fr; overflow: hidden;
    transition: border-color 0.15s;
  }
  .asset-card:hover { border-color: #4f6ef7; }
  .asset-card .card-img {
    width: 280px; height: 180px; object-fit: cover; background: #0f1117;
    cursor: pointer; display: block;
  }
  .asset-card .card-body { padding: 16px 20px; display: flex; flex-direction: column; gap: 8px; }
  .asset-card .card-title { font-size: 15px; font-weight: 600; color: #e2e8f0; }
  .asset-card .card-summary { font-size: 13px; color: #94a3b8; line-height: 1.6; flex: 1; }
  .asset-card .card-footer { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
  .score-badge {
    font-size: 12px; font-weight: 600; padding: 2px 8px; border-radius: 6px;
    background: #1a3a2a; color: #4ade80;
  }
  .score-badge.mid { background: #3a3a1a; color: #fbbf24; }
  .score-badge.low { background: #3a1a1a; color: #f87171; }
  .tag {
    font-size: 11px; padding: 2px 7px; border-radius: 6px;
    background: #1e3a5f; color: #60a5fa;
  }
  .page-type-tag {
    font-size: 11px; padding: 2px 7px; border-radius: 6px;
    background: #2d1e3a; color: #c084fc;
  }

  .curate-empty { flex: 1; display: flex; align-items: center; justify-content: center; color: #475569; font-size: 13px; }

  /* Export buttons */
  .export-btn {
    font-size: 11px; padding: 3px 10px; border-radius: 6px; text-decoration: none;
    background: #1e3a5f; color: #60a5fa; border: 1px solid #2d4a6f;
    transition: background 0.15s; white-space: nowrap;
  }
  .export-btn:hover { background: #1a3050; }
  .export-btn-zip { background: #1a3a2a; color: #4ade80; border-color: #2d4a3a; }
  .export-btn-zip:hover { background: #152e20; }

  /* Editable content fields */
  .editable {
    outline: none; border-radius: 4px; padding: 2px 4px; margin: -2px -4px;
    transition: background 0.15s, box-shadow 0.15s; cursor: text;
  }
  .editable:hover { background: rgba(79,110,247,0.08); }
  .editable:focus { background: rgba(79,110,247,0.12); box-shadow: 0 0 0 2px rgba(79,110,247,0.4); }
  .edit-saved { animation: flash-green 0.6s ease; }
  @keyframes flash-green {
    0%   { box-shadow: 0 0 0 2px rgba(74,222,128,0.7); }
    100% { box-shadow: none; }
  }

  /* Lightbox */
  #lightbox {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85);
    align-items: center; justify-content: center; z-index: 100;
  }
  #lightbox.open { display: flex; }
  #lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 8px; }
  #lightbox-close {
    position: fixed; top: 20px; right: 24px; font-size: 28px; color: #94a3b8;
    cursor: pointer; background: none; border: none; line-height: 1;
  }

  /* Spinner */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    display: inline-block; width: 10px; height: 10px; border: 2px solid #34d399;
    border-top-color: transparent; border-radius: 50%;
    animation: spin 0.7s linear infinite; margin-right: 4px;
  }
  .spinner-lg {
    display: inline-block; width: 20px; height: 20px; border: 3px solid #7c3aed;
    border-top-color: transparent; border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  /* Left panel mode switcher */
  .mode-tabs { display: flex; border-bottom: 1px solid #1e2535; }
  .mode-tab {
    flex: 1; padding: 10px; font-size: 12px; font-weight: 500; color: #64748b;
    background: none; border: none; border-bottom: 2px solid transparent;
    cursor: pointer; transition: color 0.15s, border-color 0.15s;
  }
  .mode-tab:hover { color: #e2e8f0; }
  .mode-tab.active { color: #e2e8f0; border-bottom-color: #4f6ef7; }

  .mode-panel { display: none; flex-direction: column; flex: 1; overflow: hidden; }
  .mode-panel.active { display: flex; }

  /* Explore form */
  .explore-form { padding: 16px 20px; border-bottom: 1px solid #1e2535; display: flex; flex-direction: column; gap: 10px; }
  .explore-form label { font-size: 12px; color: #94a3b8; }
  .explore-form input[type="url"],
  .explore-form input[type="text"] {
    width: 100%; background: #1e2535; border: 1px solid #2d3748;
    border-radius: 8px; color: #e2e8f0; font-size: 13px; padding: 8px 12px; outline: none;
  }
  .explore-form input:focus { border-color: #4f6ef7; }
  .explore-form input::placeholder { color: #475569; }
  .explore-form button {
    width: 100%; padding: 10px; background: #059669; border: none; border-radius: 8px;
    color: #fff; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.15s;
  }
  .explore-form button:hover { background: #047857; }
  .explore-form button:disabled { background: #2d3748; color: #64748b; cursor: not-allowed; }

  /* Explore task items */
  .explore-item {
    background: #1e2535; border: 1px solid #2d3748; border-radius: 8px;
    padding: 12px; cursor: pointer; transition: border-color 0.15s;
  }
  .explore-item:hover { border-color: #059669; }
  .explore-item.active { border-color: #059669; background: #0f2a1e; }
  .explore-item .explore-url { font-size: 12px; color: #60a5fa; word-break: break-all; }
  .explore-item .explore-meta { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
  .explore-item .explore-id { font-size: 11px; color: #475569; font-family: monospace; }

  /* Site understanding panel */
  .site-info { padding: 16px 24px; border-bottom: 1px solid #1e2535; display: flex; flex-direction: column; gap: 8px; }
  .site-info .site-name { font-size: 15px; font-weight: 600; color: #e2e8f0; }
  .site-info .site-meta { display: flex; gap: 8px; flex-wrap: wrap; }
  .site-info .site-cat { font-size: 12px; padding: 2px 8px; border-radius: 6px; background: #1e3a5f; color: #60a5fa; }
  .site-info .site-strategy { font-size: 12px; color: #64748b; line-height: 1.5; }
  .candidate-list { padding: 0 24px 16px; display: flex; flex-direction: column; gap: 6px; }
  .candidate-item {
    background: #1e2535; border: 1px solid #2d3748; border-radius: 8px;
    padding: 10px 14px; display: flex; align-items: center; gap: 10px;
  }
  .candidate-item .c-score { font-size: 12px; font-weight: 600; color: #4ade80; min-width: 32px; }
  .candidate-item .c-label { font-size: 13px; color: #e2e8f0; flex: 1; }
  .candidate-item .c-path { font-size: 11px; color: #475569; font-family: monospace; }
  .candidate-item .c-type { font-size: 11px; padding: 1px 6px; border-radius: 4px; background: #2d1e3a; color: #c084fc; }
</style>
</head>
<body>

<header>
  <h1>Browser Agent</h1>
  <span>Playwright + GPT-4o</span>
</header>

<div class="main">
  <!-- Left: mode tabs + panels -->
  <div class="panel-left">
    <div class="mode-tabs">
      <button class="mode-tab active" onclick="switchMode('agent',this)">Agent 任务</button>
      <button class="mode-tab" onclick="switchMode('explore',this)">网站探索</button>
    </div>

    <!-- Agent mode panel -->
    <div class="mode-panel active" id="mode-agent">
      <div class="top">
        <label>任务列表（用 --- 分隔不同任务，每个任务可多行描述）</label>
        <textarea id="task-input" placeholder="打开 https://example.com&#10;截图整页保存为 a.png&#10;&#10;---&#10;&#10;打开 https://news.ycombinator.com&#10;滚动到底部并截图保存为 b.png"></textarea>
        <button id="run-btn" onclick="submitTasks()">运行</button>
      </div>
      <div class="quick-tasks">
        <label>快捷任务</label>
        <button class="quick-btn" onclick="fillQuickTask()">🤖 生成昨日 AI 简讯推文（宝玉风格）</button>
      </div>
      <div class="task-list" id="task-list"></div>
    </div>

    <!-- Explore mode panel -->
    <div class="mode-panel" id="mode-explore">
      <div class="explore-form">
        <label>网站 URL</label>
        <input type="url" id="explore-url" placeholder="https://example.com" />
        <label>产品描述（可选）</label>
        <input type="text" id="explore-ctx" placeholder="AI analytics platform for e-commerce teams" />
        <label>Cookies 文件路径（可选，用于登录态）</label>
        <input type="text" id="explore-cookies" placeholder="cookies.json" />
        <label>最大探索页数（默认 12）</label>
        <input type="number" id="explore-maxpages" placeholder="12" min="1" max="30" value="12" style="width:80px" />
        <button id="explore-btn" onclick="startExplore()">开始探索</button>
      </div>
      <div class="task-list" id="explore-list"></div>
    </div>
  </div>

  <!-- Right: detail view -->
  <div class="panel-right" id="panel-right">
    <div class="empty" id="empty-state">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/>
      </svg>
      <span>选择左侧任务查看详情</span>
    </div>
  </div>
</div>

<!-- Lightbox -->
<div id="lightbox" onclick="closeLightbox()">
  <button id="lightbox-close" onclick="closeLightbox()">×</button>
  <img id="lightbox-img" src="" alt="">
</div>

<script>
// ── State ────────────────────────────────────────────────────────────────────
const tasks = {};
const exploreTasks = {};
let activeId = null;
let activeEid = null;

// ── SSE ──────────────────────────────────────────────────────────────────────
const es = new EventSource('/tasks/stream');
es.onmessage = (e) => {
  const msg = JSON.parse(e.data);
  if (msg.type === 'snapshot') {
    msg.tasks.forEach(t => { tasks[t.id] = t; renderTaskItem(t); });
    (msg.explore_tasks || []).forEach(t => { exploreTasks[t.id] = t; renderExploreItem(t); });
  } else if (msg.type === 'new_task') {
    const t = msg.task;
    tasks[t.id] = t;
    renderTaskItem(t);
  } else if (msg.type === 'status') {
    if (!tasks[msg.task_id]) return;
    tasks[msg.task_id].status = msg.data;
    if (msg.screenshots) tasks[msg.task_id].screenshots = msg.screenshots;
    updateTaskItem(msg.task_id);
    if (msg.task_id === activeId) refreshDetail(msg.task_id);
  } else if (msg.type === 'log') {
    if (!tasks[msg.task_id]) return;
    tasks[msg.task_id].logs.push(msg.data);
    if (msg.task_id === activeId) appendLog(msg.data);
  } else if (msg.type === 'explore_new') {
    const t = msg.task;
    exploreTasks[t.id] = t;
    renderExploreItem(t);
  } else if (msg.type === 'explore_status') {
    if (!exploreTasks[msg.eid]) return;
    exploreTasks[msg.eid].status = msg.data;
    if (msg.screenshots) exploreTasks[msg.eid].screenshots = msg.screenshots;
    updateExploreItem(msg.eid);
    if (msg.eid === activeEid) refreshExploreDetail(msg.eid);
  } else if (msg.type === 'explore_log') {
    if (!exploreTasks[msg.eid]) return;
    exploreTasks[msg.eid].logs.push(msg.data);
    if (msg.eid === activeEid) appendExploreLog(msg.data);
  }
};

// ── Submit ────────────────────────────────────────────────────────────────────
let isSubmitting = false;

async function submitTasks() {
  if (isSubmitting) return;
  const raw = document.getElementById('task-input').value.trim();
  if (!raw) return;
  const lines = raw.split(/\n\s*---\s*\n/).map(s => s.trim()).filter(Boolean);
  if (!lines.length) return;

  const btn = document.getElementById('run-btn');
  isSubmitting = true;
  btn.disabled = true;
  btn.textContent = '提交中...';

  try {
    await fetch('/run', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tasks: lines }),
    });
    document.getElementById('task-input').value = '';
  } finally {
    isSubmitting = false;
    btn.disabled = false;
    btn.textContent = '运行';
  }
}

// ── Render task list item ─────────────────────────────────────────────────────
function renderTaskItem(t) {
  if (document.getElementById(`item-${t.id}`)) return;
  const div = document.createElement('div');
  div.className = 'task-item';
  div.id = `item-${t.id}`;
  div.onclick = () => selectTask(t.id);
  div.innerHTML = `
    <div class="task-text" title="${escHtml(t.task)}">${escHtml(t.task)}</div>
    <div class="task-meta">
      <span class="task-id">#${t.id}</span>
      <span class="badge ${t.status}" id="badge-${t.id}">${badgeLabel(t.status)}</span>
    </div>`;
  document.getElementById('task-list').prepend(div);
}

function updateTaskItem(id) {
  const t = tasks[id];
  const badge = document.getElementById(`badge-${id}`);
  if (badge) { badge.className = `badge ${t.status}`; badge.innerHTML = badgeLabel(t.status); }
}

function badgeLabel(status) {
  const map = { pending: '等待', running: '<span class="spinner"></span>运行中', done: '完成', failed: '失败' };
  return map[status] || status;
}

// ── Detail view ───────────────────────────────────────────────────────────────
function selectTask(id) {
  activeId = id;
  document.querySelectorAll('.task-item').forEach(el => el.classList.remove('active'));
  const item = document.getElementById(`item-${id}`);
  if (item) item.classList.add('active');
  refreshDetail(id);
}

function refreshDetail(id) {
  const t = tasks[id];
  const right = document.getElementById('panel-right');

  right.innerHTML = `
    <div class="detail">
      <div class="detail-header">
        <div class="task-title">${escHtml(t.task)}</div>
        <span class="badge ${t.status}" id="detail-badge-${id}">${badgeLabel(t.status)}</span>
        ${t.status === 'done' ? `
        <a href="/export/task/${id}/json" download class="export-btn">↓ JSON</a>
        <a href="/export/task/${id}/zip" download class="export-btn export-btn-zip">↓ ZIP</a>
        ` : ''}
        <button onclick="deleteTask('task','${id}')" class="export-btn" style="background:#3a1a1a;color:#f87171;border-color:#7f1d1d;" title="删除任务">🗑</button>
      </div>
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('${id}','logs',this)">日志</button>
        <button class="tab-btn" onclick="switchTab('${id}','shots',this)">截图 ${t.screenshots?.length ? '('+t.screenshots.length+')' : ''}</button>
        <button class="tab-btn" onclick="switchTab('${id}','curate',this)">素材筛选</button>
        <button class="tab-btn" onclick="switchTab('${id}','gen',this)">内容生成</button>
      </div>
      <div class="tab-panel active" id="tab-logs-${id}">
        <div class="logs-wrap"><pre class="logs" id="detail-logs-${id}"></pre></div>
      </div>
      <div class="tab-panel" id="tab-shots-${id}">
        <div class="screenshots-wrap" id="detail-shots-${id}"></div>

          </button>
        </div>

function switchTab(id, tab, btn) {
  document.querySelectorAll(`#panel-right .tab-btn`).forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  ['logs','shots','curate','gen'].forEach(name => {
    const el = document.getElementById(`tab-${name}-${id}`);
    if (el) el.classList.toggle('active', name === tab);
  });
}

function appendLog(msg) {
  const pre = document.getElementById(`detail-logs-${activeId}`);
  if (!pre) return;
  pre.appendChild(formatLog(msg));
  pre.parentElement.scrollTop = pre.parentElement.scrollHeight;
}

function formatLog(msg) {
  const span = document.createElement('span');
  if (msg.includes('→ ['))       span.className = 'log-action';
  else if (msg.includes('✓') || msg.includes('✅')) span.className = 'log-ok';
  else if (msg.includes('⚠️'))   span.className = 'log-warn';
  else if (msg.includes('ERROR') || msg.includes('失败')) span.className = 'log-err';
  span.textContent = msg + '\n';
  return span;
}

function renderShots(id) {
  const t = tasks[id];
  const container = document.getElementById(`detail-shots-${id}`);
  if (!container || !t.screenshots?.length) return;
  container.innerHTML = '';
  t.screenshots.forEach(name => {
    const img = document.createElement('img');
    img.src = `/screenshots/${id}/${name}`;
    img.alt = name;
    img.title = name;
    img.onclick = (e) => { e.stopPropagation(); openLightbox(img.src); };
    container.appendChild(img);
  });
}

// ── Curation (agent tasks) ────────────────────────────────────────────────────
async function runCuration(id) {
  const btn = document.getElementById(`curate-btn-${id}`);
  const body = document.getElementById(`curate-body-${id}`);
  const ctx = document.getElementById(`curate-ctx-${id}`)?.value.trim() || '';

  btn.disabled = true;
  btn.textContent = '分析中...';
  body.innerHTML = '<div class="curate-empty"><span class="spinner-lg"></span></div>';

  try {
    const res = await fetch('/curate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ task_id: id, product_context: ctx }),
    });
    const data = await res.json();
    if (data.error) {
      body.innerHTML = `<div class="curate-empty" style="color:#f87171">${escHtml(data.error)}</div>`;
      return;
    }
    tasks[id].curation = data;
    renderCurationResult(id, data, false);
  } catch(e) {
    body.innerHTML = `<div class="curate-empty" style="color:#f87171">请求失败: ${escHtml(String(e))}</div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = 'AI 筛选素材';
  }
}

// ── Explore: submit ───────────────────────────────────────────────────────────
let isExploring = false;

async function startExplore() {
  if (isExploring) return;
  const url = document.getElementById('explore-url').value.trim();
  if (!url) return;
  const ctx = document.getElementById('explore-ctx').value.trim();
  const cookiesPath = document.getElementById('explore-cookies').value.trim();
  const maxPages = parseInt(document.getElementById('explore-maxpages').value) || 12;

  const btn = document.getElementById('explore-btn');
  isExploring = true;
  btn.disabled = true;
  btn.textContent = '提交中...';

  try {
    const res = await fetch('/explore', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url, product_context: ctx, cookies_path: cookiesPath, max_pages: maxPages }),
    });
    const data = await res.json();
    if (data.eid && !exploreTasks[data.eid]) {
      exploreTasks[data.eid] = { id: data.eid, url, product_context: ctx, status: 'pending', logs: [], screenshots: [] };
      renderExploreItem(exploreTasks[data.eid]);
    }
    document.getElementById('explore-url').value = '';
    document.getElementById('explore-ctx').value = '';
    document.getElementById('explore-cookies').value = '';
  } finally {
    isExploring = false;
    btn.disabled = false;
    btn.textContent = '开始探索';
  }
}

// ── renderCurationResult (shared by agent tasks and explore tasks) ─────────────
function renderCurationResult(id, data, isExplore = false) {
  const bodyId = isExplore ? `ecurate-body-${id.slice(1)}` : `curate-body-${id}`;
  const statsId = isExplore ? `ecurate-stats-${id.slice(1)}` : `curate-stats-${id}`;
  const body = document.getElementById(bodyId);
  if (!body) return;

  const { cards, stats } = data;
  const statsHtml = `共 ${stats.total} 张 → 去重后 ${stats.after_dedup} 张 → 筛选出 <strong style="color:#4ade80">${stats.kept} 张</strong>优质素材`;
  const statsEl = document.getElementById(statsId);
  if (statsEl) {
    statsEl.innerHTML = statsHtml;
  } else {
    const bar = document.createElement('div');
    bar.className = 'curate-stats';
    bar.id = statsId;
    bar.innerHTML = statsHtml;
    body.parentElement.insertBefore(bar, body);
  }

  if (!cards.length) {
    body.innerHTML = '<div class="curate-empty">未找到符合条件的营销素材，尝试降低最低分要求或补充产品描述</div>';
    return;
  }

  body.className = 'cards-wrap';
  body.innerHTML = '';
  cards.forEach(card => {
    const score = card.marketing_score || 0;
    const scoreClass = score >= 7 ? '' : score >= 5 ? 'mid' : 'low';
    const tags = (card.feature_tags || []).map(t => `<span class="tag">${escHtml(t)}</span>`).join('');
    const pageType = card.page_type ? `<span class="page-type-tag">${escHtml(card.page_type)}</span>` : '';
    const el = document.createElement('div');
    el.className = 'asset-card';
    el.innerHTML = `
      <img class="card-img" src="${escHtml(card.image_url)}" alt="${escHtml(card.title)}"
           onclick="openLightbox('${escHtml(card.image_url)}')" />
      <div class="card-body">
        <div class="card-title">${escHtml(card.title)}</div>
        <div class="card-summary">${escHtml(card.summary)}</div>
        <div class="card-footer">
          <span class="score-badge ${scoreClass}">${score.toFixed(1)} 分</span>
          ${pageType}
          ${tags}
        </div>
      </div>`;
    body.appendChild(el);
  });
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Content Generation ────────────────────────────────────────────────────────
async function runGenerate(source, sourceId) {
  const isExplore = source === 'explore';
  const btnId = isExplore ? `egen-btn-${sourceId}` : `gen-btn-${sourceId}`;
  const bodyId = isExplore ? `egen-body-${sourceId}` : `gen-body-${sourceId}`;
  const btn = document.getElementById(btnId);
  const body = document.getElementById(bodyId);

  btn.disabled = true;
  btn.textContent = '生成中...';
  body.innerHTML = '<div class="curate-empty"><span class="spinner-lg"></span></div>';

  try {
    const res = await fetch('/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ source, source_id: sourceId }),
    });
    const data = await res.json();
    if (data.error) {
      body.innerHTML = `<div class="curate-empty" style="color:#f87171">${escHtml(data.error)}</div>`;
      return;
    }
    if (isExplore) exploreTasks[sourceId].generated = data;
    else tasks[sourceId].generated = data;
    renderGeneratedContent(bodyId, data);
  } catch(e) {
    body.innerHTML = `<div class="curate-empty" style="color:#f87171">请求失败: ${escHtml(String(e))}</div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = '生成营销文案';
  }
}

function renderGeneratedContent(bodyId, data) {
  const body = document.getElementById(bodyId);
  if (!body) return;

  // Derive source + sourceId from bodyId: "gen-body-{id}" or "egen-body-{eid}"
  const isExplore = bodyId.startsWith('egen-body-');
  const sourceId = isExplore ? bodyId.replace('egen-body-', '') : bodyId.replace('gen-body-', '');
  const source = isExplore ? 'explore' : 'task';

  const { ai_page, tweets, review } = data;
  body.className = 'cards-wrap';
  body.innerHTML = '';

  // Helper: make an editable span that auto-saves on blur
  const editable = (text, fieldPath) => {
    const span = document.createElement('span');
    span.className = 'editable';
    span.contentEditable = 'true';
    span.textContent = text || '';
    span.dataset.field = fieldPath;
    span.addEventListener('blur', () => saveEdit(source, sourceId, fieldPath, span));
    span.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); span.blur(); } });
    return span;
  };

  // Review issues banner
  if (review && !review.approved && review.issues?.length) {
    const banner = document.createElement('div');
    banner.style.cssText = 'background:#3a1a1a;border:1px solid #7f1d1d;border-radius:8px;padding:12px 16px;font-size:12px;color:#fca5a5;';
    banner.innerHTML = `<strong>审核发现问题（已自动修正）：</strong><br>${review.issues.map(i => escHtml(i)).join('<br>')}`;
    body.appendChild(banner);
  }

  // Edit hint
  const hint = document.createElement('div');
  hint.style.cssText = 'font-size:11px;color:#475569;text-align:right;padding:0 4px 4px;';
  hint.textContent = '✏️ 点击任意文字可直接编辑，失焦自动保存';
  body.appendChild(hint);

  // AI Page section
  if (ai_page && !ai_page._parse_error) {
    const hero = ai_page.hero || {};
    const section = document.createElement('div');
    section.style.cssText = 'background:#1e2535;border:1px solid #2d3748;border-radius:12px;padding:20px;display:flex;flex-direction:column;gap:12px;';

    const label = document.createElement('div');
    label.style.cssText = 'font-size:11px;color:#7c3aed;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;';
    label.textContent = 'AI Page · Hero';
    section.appendChild(label);

    const headlineEl = document.createElement('div');
    headlineEl.style.cssText = 'font-size:20px;font-weight:700;color:#e2e8f0;line-height:1.3;';
    headlineEl.appendChild(editable(hero.headline, 'ai_page.hero.headline'));
    section.appendChild(headlineEl);

    const subEl = document.createElement('div');
    subEl.style.cssText = 'font-size:14px;color:#94a3b8;line-height:1.6;';
    subEl.appendChild(editable(hero.subheadline, 'ai_page.hero.subheadline'));
    section.appendChild(subEl);

    const ctaEl = document.createElement('div');
    ctaEl.style.cssText = 'display:inline-block;background:#4f6ef7;color:#fff;padding:8px 18px;border-radius:8px;font-size:13px;font-weight:500;width:fit-content;';
    ctaEl.appendChild(editable(hero.cta_text, 'ai_page.hero.cta_text'));
    section.appendChild(ctaEl);

    if (ai_page.social_proof) {
      const spEl = document.createElement('div');
      spEl.style.cssText = 'font-size:12px;color:#64748b;';
      spEl.appendChild(editable(ai_page.social_proof, 'ai_page.social_proof'));
      section.appendChild(spEl);
    }
    body.appendChild(section);

    // Feature sections
    (ai_page.features || []).forEach((f, fi) => {
      const el = document.createElement('div');
      el.style.cssText = 'background:#1e2535;border:1px solid #2d3748;border-radius:12px;padding:16px 20px;display:flex;flex-direction:column;gap:6px;';
      const fl = document.createElement('div');
      fl.style.cssText = 'font-size:11px;color:#7c3aed;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;';
      fl.textContent = 'Feature';
      el.appendChild(fl);
      const ft = document.createElement('div');
      ft.style.cssText = 'font-size:15px;font-weight:600;color:#e2e8f0;';
      ft.appendChild(editable(f.title, `ai_page.features.${fi}.title`));
      el.appendChild(ft);
      const fd = document.createElement('div');
      fd.style.cssText = 'font-size:13px;color:#94a3b8;line-height:1.6;';
      fd.appendChild(editable(f.description, `ai_page.features.${fi}.description`));
      el.appendChild(fd);
      body.appendChild(el);
    });

    // FAQ
    if (ai_page.faq?.length) {
      const faqEl = document.createElement('div');
      faqEl.style.cssText = 'background:#1e2535;border:1px solid #2d3748;border-radius:12px;padding:16px 20px;display:flex;flex-direction:column;gap:12px;';
      const faqLabel = document.createElement('div');
      faqLabel.style.cssText = 'font-size:11px;color:#7c3aed;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;';
      faqLabel.textContent = 'FAQ';
      faqEl.appendChild(faqLabel);
      ai_page.faq.forEach((item, qi) => {
        const qEl = document.createElement('div');
        const qTitle = document.createElement('div');
        qTitle.style.cssText = 'font-size:13px;font-weight:600;color:#e2e8f0;margin-bottom:4px;';
        qTitle.appendChild(editable(item.q, `ai_page.faq.${qi}.q`));
        const aEl = document.createElement('div');
        aEl.style.cssText = 'font-size:13px;color:#94a3b8;line-height:1.6;';
        aEl.appendChild(editable(item.a, `ai_page.faq.${qi}.a`));
        qEl.appendChild(qTitle);
        qEl.appendChild(aEl);
        faqEl.appendChild(qEl);
      });
      body.appendChild(faqEl);
    }
  }

  // Tweets section
  if (tweets && !tweets._parse_error) {
    const tweetSection = document.createElement('div');
    tweetSection.style.cssText = 'background:#1e2535;border:1px solid #2d3748;border-radius:12px;padding:16px 20px;display:flex;flex-direction:column;gap:12px;';
    const tweetLabel = document.createElement('div');
    tweetLabel.style.cssText = 'font-size:11px;color:#059669;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;';
    tweetLabel.textContent = '推文文案';
    tweetSection.appendChild(tweetLabel);

    const makeEditBlock = (label, text, fieldPath) => {
      const wrap = document.createElement('div');
      const header = document.createElement('div');
      header.style.cssText = 'display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;';
      const lbl = document.createElement('span');
      lbl.style.cssText = 'font-size:11px;color:#64748b;';
      lbl.textContent = label;
      const copyBtn = document.createElement('button');
      copyBtn.style.cssText = 'font-size:11px;padding:2px 8px;background:#1e3a5f;border:1px solid #2d3748;border-radius:4px;color:#60a5fa;cursor:pointer;';
      copyBtn.textContent = '复制';
      copyBtn.onclick = () => copyText(copyBtn, textEl.textContent);
      header.appendChild(lbl);
      header.appendChild(copyBtn);
      const textEl = document.createElement('div');
      textEl.style.cssText = 'font-size:13px;color:#e2e8f0;line-height:1.6;background:#0f1117;padding:10px 14px;border-radius:8px;white-space:pre-wrap;';
      textEl.appendChild(editable(text, fieldPath));
      wrap.appendChild(header);
      wrap.appendChild(textEl);
      return wrap;
    };

    if (tweets.single_tweet) tweetSection.appendChild(makeEditBlock('单条推文', tweets.single_tweet, 'tweets.single_tweet'));
    if (tweets.founder_voice) tweetSection.appendChild(makeEditBlock('创始人口吻', tweets.founder_voice, 'tweets.founder_voice'));

    if (tweets.thread?.length) {
      const threadLabel = document.createElement('div');
      threadLabel.style.cssText = 'font-size:11px;color:#64748b;';
      threadLabel.textContent = `Thread (${tweets.thread.length} 条)`;
      tweetSection.appendChild(threadLabel);
      tweets.thread.forEach((t, i) => {
        tweetSection.appendChild(makeEditBlock(`${i+1}/${tweets.thread.length}`, t, `tweets.thread.${i}`));
      });
    }
    body.appendChild(tweetSection);
  }
}

async function saveEdit(source, sourceId, field, span) {
  const value = span.textContent.trim();
  try {
    const r = await fetch('/generate/edit', {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ source, source_id: sourceId, field, value }),
    });
    const data = await r.json();
    if (data.ok) {
      span.classList.remove('edit-saved');
      void span.offsetWidth; // force reflow to restart animation
      span.classList.add('edit-saved');
      // Update local store
      if (source === 'explore' && exploreTasks[sourceId]?.generated)
        _setNested(exploreTasks[sourceId].generated, field, value);
      else if (tasks[sourceId]?.generated)
        _setNested(tasks[sourceId].generated, field, value);
    }
  } catch(e) { /* silent fail */ }
}

function _setNested(obj, path, value) {
  const keys = path.split('.');
  for (let i = 0; i < keys.length - 1; i++) {
    const k = keys[i];
    // Handle array indices
    const next = keys[i+1];
    if (!isNaN(parseInt(next))) {
      if (!Array.isArray(obj[k])) obj[k] = [];
    } else {
      if (typeof obj[k] !== 'object' || obj[k] === null) obj[k] = {};
    }
    obj = obj[k];
  }
  obj[keys[keys.length - 1]] = value;
}

function copyText(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.textContent;
    btn.textContent = '已复制';
    btn.style.color = '#4ade80';
    setTimeout(() => { btn.textContent = orig; btn.style.color = '#60a5fa'; }, 1500);
  });
}
